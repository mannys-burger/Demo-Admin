<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MenuOS Pro — White-Label Restaurant Platform</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14120F; --surface:#1E1B17; --surface-2:#26221C; --surface-3:#312B23;
    --border:#3A3329; --text:#F5F0E6; --text-dim:#B4A996; --text-faint:#7C7264;
    --accent:#E8A33D; --accent-dark:#C4841F; --accent-soft:rgba(232,163,61,0.14);
    --teal:#2FB8A3; --red:#E1543F; --blue:#60A5FA; --green:#4ADE80; --purple:#B794F4;
  }
  html.light{
    --bg:#F6F3EC; --surface:#FFFFFF; --surface-2:#F1ECE1; --surface-3:#E7DFCF;
    --border:#E2D9C7; --text:#241F16; --text-dim:#6B6151; --text-faint:#9C917C;
    --accent-soft:rgba(232,163,61,0.16);
  }
  *{ -webkit-tap-highlight-color: transparent; box-sizing:border-box; }
  html,body{ background:var(--bg); }
  body{ font-family:'Inter',sans-serif; color:var(--text); overscroll-behavior:none; transition:background .3s ease,color .3s ease; }
  .font-display{ font-family:'Fraunces',serif; }
  .font-mono{ font-family:'JetBrains Mono',monospace; }
  ::-webkit-scrollbar{ width:6px; height:6px; }
  ::-webkit-scrollbar-thumb{ background:var(--surface-3); border-radius:10px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  .no-scrollbar::-webkit-scrollbar{ display:none; }
  .no-scrollbar{ -ms-overflow-style:none; scrollbar-width:none; }
  .sheet{ transition: transform .38s cubic-bezier(.32,.72,0,1), opacity .3s ease; }
  .sheet-enter{ transform: translateY(100%); }
  .sheet-open{ transform: translateY(0%); }
  @keyframes pulseDot{ 0%,100%{opacity:1} 50%{opacity:.35} }
  .pulse-dot{ animation:pulseDot 1.6s ease-in-out infinite; }
  @keyframes floatIn{ from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:translateY(0)} }
  .float-in{ animation:floatIn .35s cubic-bezier(.22,1,.36,1) both; }
  @keyframes popIn{ from{opacity:0; transform:scale(.9)} to{opacity:1; transform:scale(1)} }
  .pop-in{ animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both; }
  .qty-btn,.btn-press{ transition: transform .12s ease, background .2s ease, opacity .2s ease; }
  .qty-btn:active,.btn-press:active{ transform:scale(.92); }
  .item-card{ transition: transform .18s ease, border-color .2s ease; }
  .item-card:active{ transform:scale(.985); }
  .tab-pill{ transition: all .25s cubic-bezier(.22,1,.36,1); }
  .tgl{ appearance:none; width:42px; height:24px; border-radius:999px; background:var(--surface-3); position:relative; cursor:pointer; transition:background .25s ease; border:1px solid var(--border); flex-shrink:0; }
  .tgl:checked{ background:var(--accent); border-color:var(--accent); }
  .tgl::before{ content:''; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:999px; background:#fff; transition:transform .25s cubic-bezier(.32,.72,0,1); box-shadow:0 1px 3px rgba(0,0,0,.4); }
  .tgl:checked::before{ transform:translateX(18px); }
  .phone-frame{ box-shadow: 0 0 0 10px #0A0908, 0 0 0 12px #2a251d, 0 30px 80px -20px rgba(0,0,0,.7); }
  html.light .phone-frame{ box-shadow: 0 0 0 10px #d8cfba, 0 0 0 12px #eee7d8, 0 30px 80px -20px rgba(0,0,0,.25); }
  .status-chip{ font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.04em; }
  input:focus, textarea:focus, select:focus{ outline:2px solid var(--accent); outline-offset:1px; }
  button:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .side-link{ transition: background .2s ease, color .2s ease; }
  .side-link.active{ background:var(--accent); color:#14120F !important; }
  .badge{ font-size:10px; font-family:'JetBrains Mono',monospace; padding:2px 6px; border-radius:6px; }
  @media (prefers-reduced-motion: reduce){ *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; } }
  .scale-in{ transition: opacity .2s ease, transform .2s ease; }
</style>
</head>
<body class="min-h-screen">

<!-- DEBUG NAV -->
<div class="fixed top-0 left-0 right-0 z-[100] flex justify-center pointer-events-none">
  <div class="pointer-events-auto mt-3 flex items-center gap-1 p-1 rounded-full border shadow-2xl backdrop-blur-xl max-w-[95vw] overflow-x-auto no-scrollbar"
       style="background:color-mix(in srgb, var(--surface-2) 88%, transparent); border-color:var(--border);">
    <button data-screen="client" class="nav-btn btn-press px-3.5 py-2 rounded-full text-xs font-semibold font-mono tracking-wide flex items-center gap-1.5 whitespace-nowrap">📱 CLIENT</button>
    <button data-screen="admin" class="nav-btn btn-press px-3.5 py-2 rounded-full text-xs font-semibold font-mono tracking-wide flex items-center gap-1.5 whitespace-nowrap">🛠️ ADMIN</button>
    <div class="w-px h-5 mx-1" style="background:var(--border)"></div>
    <button onclick="toggleTheme()" id="themeBtn" class="btn-press px-2.5 py-2 rounded-full text-xs" style="color:var(--text-dim)">🌙</button>
    <button onclick="toggleLang()" id="langBtn" class="btn-press px-2.5 py-2 rounded-full text-xs font-mono font-semibold" style="color:var(--text-dim)">AR</button>
  </div>
</div>

<!-- ============== SCREEN: CLIENT ============== -->
<div id="screen-client" class="min-h-screen pt-20 pb-10 hidden">
  <div class="max-w-md mx-auto sm:phone-frame sm:rounded-[2.5rem] sm:my-6 sm:overflow-hidden relative" style="background:var(--bg);">

    <div id="installBanner" class="hidden mx-3 mt-3 rounded-2xl p-3 flex items-center gap-3 border float-in" style="background:var(--surface-2); border-color:var(--border);">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center text-lg shrink-0" style="background:var(--accent-soft); color:var(--accent);">⤓</div>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-semibold" id="installTitle">Add to Home Screen</p>
        <p class="text-[11px] leading-tight" style="color:var(--text-dim)" id="installBody">Tap Share then "Add to Home Screen" for the full app feel.</p>
      </div>
      <button onclick="dismissInstallBanner()" class="text-lg leading-none px-1" style="color:var(--text-faint)">×</button>
    </div>

    <div id="closedBanner" class="hidden mx-3 mt-3 rounded-2xl p-3 flex items-center gap-2 border" style="background:rgba(225,84,63,.1); border-color:var(--red);">
      <span class="text-lg">🕒</span>
      <p class="text-xs font-medium" style="color:var(--red)" id="closedText">We're currently closed — you can still browse the menu.</p>
    </div>

    <header class="sticky top-0 z-30 backdrop-blur-xl px-4 pt-4 pb-3" style="background:color-mix(in srgb, var(--bg) 88%, transparent);">
      <div class="flex items-center gap-3">
        <div id="clientLogo" class="w-12 h-12 rounded-2xl flex items-center justify-center text-xl font-display font-semibold shrink-0 shadow-lg" style="background:var(--accent); color:#14120F;"></div>
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <h1 id="clientRestName" class="font-display font-semibold text-lg leading-tight truncate"></h1>
          </div>
          <button onclick="openBranchPicker()" id="branchPickerBtn" class="text-xs truncate flex items-center gap-1" style="color:var(--text-dim)"></button>
        </div>
        <button onclick="openTrackOrder()" id="trackChip" class="hidden shrink-0 text-[10px] font-mono px-2.5 py-1.5 rounded-full border flex items-center gap-1 btn-press" style="background:var(--accent-soft); color:var(--accent); border-color:var(--accent);">
          <span class="w-1.5 h-1.5 rounded-full pulse-dot" style="background:var(--accent)"></span> <span id="trackChipText">TRACK</span>
        </button>
      </div>

      <!-- search -->
      <div class="mt-3 relative">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-sm" style="color:var(--text-faint)">🔍</span>
        <input id="searchInput" oninput="renderClientMenu()" placeholder="Search menu…" class="w-full rounded-xl pl-9 pr-3 py-2.5 text-sm border" style="background:var(--surface-2); border-color:var(--border); color:var(--text);">
      </div>

      <!-- order type -->
      <div id="orderTypeTabs" class="flex gap-2 mt-3"></div>

      <!-- category tabs -->
      <div id="categoryTabs" class="flex gap-2 mt-3 overflow-x-auto no-scrollbar pb-1"></div>
    </header>

    <main id="menuList" class="px-4 pt-2 space-y-7"></main>
    <div class="h-24"></div>

    <div id="cartBar" class="hidden fixed sm:absolute bottom-4 left-0 right-0 px-4 z-40 sheet sheet-enter">
      <button onclick="openCheckout()" class="w-full max-w-md mx-auto flex items-center justify-between rounded-2xl px-5 py-4 shadow-2xl btn-press" style="background:var(--accent); color:#14120F;">
        <span class="flex items-center gap-2 font-semibold text-sm">
          <span id="cartCount" class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold" style="background:#14120F; color:var(--accent);">0</span>
          <span id="viewCartLabel">View Cart</span>
        </span>
        <span id="cartTotal" class="font-mono font-bold"></span>
      </button>
    </div>
  </div>
</div>

<!-- Item modal -->
<div id="itemModalBackdrop" class="hidden fixed inset-0 z-[110] opacity-0 transition-opacity duration-300" style="background:rgba(0,0,0,0.6);" onclick="closeItemModal(event)">
  <div id="itemModalSheet" class="sheet sheet-enter absolute bottom-0 left-0 right-0 max-w-md mx-auto rounded-t-[2rem] max-h-[88vh] overflow-y-auto no-scrollbar" style="background:var(--surface);" onclick="event.stopPropagation()">
    <div class="sticky top-0 pt-3 pb-2 flex justify-center" style="background:var(--surface)"><div class="w-10 h-1.5 rounded-full" style="background:var(--surface-3)"></div></div>
    <div id="itemModalContent" class="px-5 pb-6"></div>
  </div>
</div>

<!-- Checkout modal -->
<div id="checkoutBackdrop" class="hidden fixed inset-0 z-[110] opacity-0 transition-opacity duration-300" style="background:rgba(0,0,0,0.6);" onclick="closeCheckout(event)">
  <div id="checkoutSheet" class="sheet sheet-enter absolute bottom-0 left-0 right-0 max-w-md mx-auto rounded-t-[2rem] max-h-[92vh] overflow-y-auto no-scrollbar" style="background:var(--surface);" onclick="event.stopPropagation()">
    <div class="sticky top-0 pt-3 pb-2 flex justify-center z-10" style="background:var(--surface)"><div class="w-10 h-1.5 rounded-full" style="background:var(--surface-3)"></div></div>
    <div id="checkoutContent" class="px-5 pb-8"></div>
  </div>
</div>

<!-- Track order modal -->
<div id="trackBackdrop" class="hidden fixed inset-0 z-[115] opacity-0 transition-opacity duration-300" style="background:rgba(0,0,0,0.6);" onclick="closeTrackOrder(event)">
  <div id="trackSheet" class="sheet sheet-enter absolute bottom-0 left-0 right-0 max-w-md mx-auto rounded-t-[2rem] max-h-[80vh] overflow-y-auto no-scrollbar" style="background:var(--surface);" onclick="event.stopPropagation()">
    <div class="sticky top-0 pt-3 pb-2 flex justify-center" style="background:var(--surface)"><div class="w-10 h-1.5 rounded-full" style="background:var(--surface-3)"></div></div>
    <div id="trackContent" class="px-5 pb-8"></div>
  </div>
</div>

<!-- Branch picker -->
<div id="branchBackdrop" class="hidden fixed inset-0 z-[116] opacity-0 transition-opacity duration-300" style="background:rgba(0,0,0,0.6);" onclick="closeBranchPicker(event)">
  <div id="branchSheet" class="sheet sheet-enter absolute bottom-0 left-0 right-0 max-w-md mx-auto rounded-t-[2rem] max-h-[70vh] overflow-y-auto no-scrollbar" style="background:var(--surface);" onclick="event.stopPropagation()">
    <div class="sticky top-0 pt-3 pb-2 flex justify-center" style="background:var(--surface)"><div class="w-10 h-1.5 rounded-full" style="background:var(--surface-3)"></div></div>
    <div id="branchContent" class="px-5 pb-8"></div>
  </div>
</div>

<div id="orderToast" class="fixed top-6 left-1/2 z-[130] transition-all duration-300 opacity-0 pointer-events-none" style="transform:translate(-50%,-30px);">
  <div class="flex items-center gap-3 px-5 py-3.5 rounded-2xl shadow-2xl border" style="background:var(--surface-2); border-color:var(--border);">
    <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm" style="background:rgba(74,222,128,.15); color:#4ADE80;">✓</div>
    <div><p class="text-sm font-semibold" id="toastTitle">Order sent!</p><p class="text-xs" style="color:var(--text-dim)" id="toastBody">Opening WhatsApp to confirm…</p></div>
  </div>
</div>
<div id="miniToast" class="fixed bottom-6 left-1/2 z-[130] transition-all duration-300 opacity-0 pointer-events-none" style="transform:translate(-50%,20px);">
  <div class="px-4 py-2.5 rounded-xl shadow-2xl border text-xs font-medium" id="miniToastText" style="background:var(--surface-2); border-color:var(--border);"></div>
</div>

<!-- ============== SCREEN: ADMIN ============== -->
<div id="screen-admin" class="min-h-screen pt-20 pb-10 hidden">
  <div class="max-w-[1400px] mx-auto px-3 sm:px-6 flex gap-5">

    <!-- Sidebar -->
    <aside class="hidden lg:block w-56 shrink-0">
      <div class="rounded-2xl border p-3 sticky top-24" style="background:var(--surface); border-color:var(--border);">
        <div class="flex items-center gap-2 px-2 py-2 mb-2">
          <div id="adminLogo" class="w-9 h-9 rounded-lg flex items-center justify-center font-display font-semibold text-sm" style="background:var(--accent); color:#14120F;"></div>
          <div class="min-w-0"><p class="text-sm font-semibold truncate" id="adminRestName"></p><p class="text-[10px] font-mono" style="color:var(--text-faint)">MenuOS Pro</p></div>
        </div>
        <div id="sidebarLinks" class="space-y-1"></div>
      </div>
    </aside>

    <!-- mobile tab bar -->
    <div class="lg:hidden fixed bottom-0 left-0 right-0 z-40 border-t backdrop-blur-xl px-2 py-2" style="background:color-mix(in srgb, var(--surface) 92%, transparent); border-color:var(--border);">
      <select id="mobileTabSelect" onchange="showAdminTab(this.value)" class="w-full rounded-xl px-3 py-2.5 text-sm border font-medium" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"></select>
    </div>

    <!-- Main content -->
    <div class="flex-1 min-w-0 pb-24 lg:pb-4">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-5">
        <div>
          <h1 id="adminTabTitle" class="font-display font-semibold text-2xl"></h1>
          <p class="text-xs mt-0.5" style="color:var(--text-dim)" id="adminTabSubtitle"></p>
        </div>
        <div class="flex items-center gap-2 flex-wrap">
          <select id="roleSelect" onchange="setRole(this.value)" class="text-xs font-mono px-3 py-2 rounded-xl border" style="background:var(--surface-2); border-color:var(--border); color:var(--text);">
            <option value="Admin">👑 Admin</option>
            <option value="Cashier">💳 Cashier</option>
            <option value="Kitchen">🍳 Kitchen</option>
          </select>
          <span class="flex items-center gap-1.5 text-[11px] font-mono px-3 py-2 rounded-xl" style="background:var(--surface-2); color:#4ADE80;">
            <span class="w-1.5 h-1.5 rounded-full pulse-dot" style="background:#4ADE80"></span> LIVE
          </span>
        </div>
      </div>
      <div id="adminContent"></div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   50+ FEATURE MAP (for reference):
   Client: search, order types, QR table detect, AR/EN + RTL, dark/light,
   favorites, ratings, badges, allergen tags, stock-aware OOS, combos,
   meal upsell, promo codes, loyalty points, returning-customer detect,
   delivery fee/min order logic, tax + service breakdown, payment methods,
   scheduled orders, live order tracking, order history + reorder,
   branch picker, open/closed hours, persistent cart, inline qty edit,
   install banner, skeleton loading, mini toasts.
   Admin: sidebar nav, role-based views (Admin/Cashier/Kitchen), overview
   analytics + 7-day chart, top sellers, order-type breakdown, low-stock
   alerts, searchable/filterable live orders, Kitchen Display Mode,
   cancel w/ reason, print receipt, CSV export, new-order sound + badge,
   menu CRUD incl. stock + variants, category mgmt, promo code mgmt,
   customer CRM w/ tiers, staff + roles, branch mgmt, table mgmt (QR),
   reviews moderation, activity log, live brand-color picker, full
   settings (hours/tax/service/delivery/min order/currency/whatsapp).
============================================================= */

let config = {
  restaurantName: "Ember & Oak",
  tagline: "Smokehouse Burgers & Craft Sides",
  logoInitials: "E&O",
  whatsappNumber: "201001234567",
  currency: "EGP",
  colors: { primary: "#E8A33D", primaryDark: "#C4841F" },
  taxRate: 0.14,
  serviceChargeRate: 0.05,
  deliveryFee: 25,
  minOrder: 100,
  workingHours: { open: "12:00", close: "23:59" },
  defaultLang: "en"
};

const SETTINGS_KEY = 'menuos_pro_settings_v1';
function loadSettings(){
  try{ const raw = localStorage.getItem(SETTINGS_KEY); if(raw) config = {...config, ...JSON.parse(raw)}; }catch(e){}
}
function saveSettings(){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(config)); }
loadSettings();

document.documentElement.style.setProperty('--accent', config.colors.primary);
document.documentElement.style.setProperty('--accent-dark', config.colors.primaryDark);

/* ---------------- i18n ---------------- */
const LANG = {
  en: {
    menu:"Menu", search:"Search menu…", delivery:"Delivery", pickup:"Pickup", dinein:"Dine-in",
    addToCart:"Add to Cart", viewCart:"View Cart", checkout:"Your Order", confirm:"Confirm Order via WhatsApp",
    promo:"Promo code", apply:"Apply", subtotal:"Subtotal", deliveryFee:"Delivery Fee", discount:"Discount",
    tax:"Tax", service:"Service Charge", total:"Total", track:"TRACK", outOfStock:"Out of Stock",
    installTitle:"Add to Home Screen", installBody:"Tap Share then \"Add to Home Screen\" for the full app feel.",
    closed:"We're currently closed — you can still browse the menu.", details:"Your Details",
    name:"Full name", phone:"Phone number", address:"Delivery address", notes:"Order Notes (optional)",
    payment:"Payment Method", cash:"Cash", cardOnDelivery:"Card on Delivery", wallet:"Mobile Wallet",
    schedule:"When?", asap:"ASAP", later:"Schedule", earnPoints:"You'll earn", points:"points",
    welcomeBack:"Welcome back!", youHave:"You have", loyaltyPts:"loyalty points", branch:"Branch",
    table:"Table", makeItMeal:"Make it a Meal", mealDesc:"Add fries + a drink for just", favorites:"Favorites",
    all:"All", combo:"Combos", orderSent:"Order sent!", openingWA:"Opening WhatsApp to confirm…",
    trackTitle:"Order Tracking", orderHistory:"Order History", reorder:"Reorder", noOrders:"No previous orders yet.",
    selectBranch:"Select Branch"
  },
  ar: {
    menu:"المنيو", search:"دور في المنيو…", delivery:"دليفري", pickup:"استلام", dinein:"داخل المطعم",
    addToCart:"ضيف للسلة", viewCart:"عرض السلة", checkout:"طلبك", confirm:"تأكيد الطلب عبر واتساب",
    promo:"كود خصم", apply:"تفعيل", subtotal:"الإجمالي الفرعي", deliveryFee:"رسوم التوصيل", discount:"الخصم",
    tax:"الضريبة", service:"الخدمة", total:"الإجمالي", track:"تتبع", outOfStock:"غير متوفر",
    installTitle:"أضف للشاشة الرئيسية", installBody:"اضغط مشاركة ثم \"إضافة للشاشة الرئيسية\" لتجربة أفضل.",
    closed:"المطعم مقفول دلوقتي — لسه تقدر تتصفح المنيو.", details:"بياناتك",
    name:"الاسم بالكامل", phone:"رقم الموبايل", address:"عنوان التوصيل", notes:"ملاحظات (اختياري)",
    payment:"طريقة الدفع", cash:"كاش", cardOnDelivery:"فيزا عند الاستلام", wallet:"محفظة إلكترونية",
    schedule:"معاد الطلب", asap:"دلوقتي", later:"جدولة", earnPoints:"هتكسب", points:"نقطة",
    welcomeBack:"أهلاً بيك تاني!", youHave:"معاك", loyaltyPts:"نقطة ولاء", branch:"الفرع",
    table:"الطاولة", makeItMeal:"خليها وجبة", mealDesc:"ضيف بطاطس ومشروب بس بـ", favorites:"المفضلة",
    all:"الكل", combo:"كومبوهات", orderSent:"تم إرسال الطلب!", openingWA:"جاري فتح واتساب للتأكيد…",
    trackTitle:"تتبع الطلب", orderHistory:"طلباتي السابقة", reorder:"اطلب تاني", noOrders:"مفيش طلبات سابقة.",
    selectBranch:"اختر الفرع"
  }
};
let currentLang = localStorage.getItem('menuos_lang') || config.defaultLang || 'en';
function t(k){ return (LANG[currentLang] && LANG[currentLang][k]) || LANG.en[k] || k; }
function toggleLang(){
  currentLang = currentLang === 'en' ? 'ar' : 'en';
  localStorage.setItem('menuos_lang', currentLang);
  document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('langBtn').textContent = currentLang === 'en' ? 'AR' : 'EN';
  renderClientMenu(); renderCartBar();
  if(!document.getElementById('screen-admin').classList.contains('hidden')) renderAdminShell();
}

/* ---------------- theme ---------------- */
let currentTheme = localStorage.getItem('menuos_theme') || 'dark';
function applyTheme(){
  document.documentElement.classList.toggle('light', currentTheme === 'light');
  document.getElementById('themeBtn').textContent = currentTheme === 'dark' ? '🌙' : '☀️';
}
function toggleTheme(){ currentTheme = currentTheme === 'dark' ? 'light' : 'dark'; localStorage.setItem('menuos_theme', currentTheme); applyTheme(); }

/* ============================================================
   MOCK DB (simulated Google Sheets via localStorage)
============================================================= */
const DB_KEY = 'menuos_pro_db_v1';
const SEED = {
  categories: [
    { id:'combos', name:'Combos', name_ar:'كومبوهات', icon:'🎁' },
    { id:'burgers', name:'Burgers', name_ar:'برجر', icon:'🍔' },
    { id:'sides', name:'Sides', name_ar:'أطباق جانبية', icon:'🍟' },
    { id:'drinks', name:'Drinks', name_ar:'مشروبات', icon:'🥤' }

function loadDB(){
  try{ const raw = localStorage.getItem(DB_KEY); if(!raw){ localStorage.setItem(DB_KEY, JSON.stringify(SEED)); return structuredClone(SEED); } return JSON.parse(raw); }
  catch(e){ localStorage.setItem(DB_KEY, JSON.stringify(SEED)); return structuredClone(SEED); }
}
function saveDB(db){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function logActivity(text){ const db = loadDB(); db.activityLog.unshift({ id: uid('log'), ts: Date.now(), text }); db.activityLog = db.activityLog.slice(0,80); saveDB(db); }

const delay = (ms) => new Promise(r => setTimeout(r, ms));

const MockAPI = {
  async getMenu(){ await delay(220); const db = loadDB(); return { categories: db.categories, items: db.items }; },
  async getOrders(){ await delay(180); return loadDB().orders.slice().sort((a,b)=>b.ts-a.ts); },
  async postOrder(order){ await delay(420); const db = loadDB(); db.orders.unshift(order); saveDB(db); logActivity(`New order ${order.id} placed by ${order.customer.name} (${fmt(order.total)})`); return { ok:true }; },
  async toggleItemActive(id, active){ await delay(160); const db = loadDB(); const it = db.items.find(i=>i.id===id); if(it) it.active = active; saveDB(db); logActivity(`${it?.name || id} marked ${active?'Active':'Inactive'}`); return {ok:true}; },
  async updateItemPrice(id, price){ await delay(160); const db = loadDB(); const it = db.items.find(i=>i.id===id); if(it) it.price = price; saveDB(db); logActivity(`Price of ${it?.name || id} updated to ${fmt(price)}`); return {ok:true}; },
  async updateItemStock(id, stock){ await delay(160); const db = loadDB(); const it = db.items.find(i=>i.id===id); if(it) it.stock = stock; saveDB(db); return {ok:true}; },
  async updateOrderStatus(id, status, reason){ await delay(160); const db = loadDB(); const o = db.orders.find(o=>o.id===id); if(o){ o.status = status; if(reason) o.cancelReason = reason; } saveDB(db); logActivity(`Order ${id} → ${status}`); return {ok:true}; },
  async addPromo(promo){ await delay(160); const db = loadDB(); db.promoCodes.unshift(promo); saveDB(db); logActivity(`Promo code ${promo.code} created`); return {ok:true}; },
  async togglePromo(id, active){ await delay(120); const db = loadDB(); const p = db.promoCodes.find(p=>p.id===id); if(p) p.active = active; saveDB(db); return {ok:true}; },
  async deletePromo(id){ await delay(120); const db = loadDB(); db.promoCodes = db.promoCodes.filter(p=>p.id!==id); saveDB(db); return {ok:true}; },
  async addStaff(person){ await delay(160); const db = loadDB(); db.staff.unshift(person); saveDB(db); logActivity(`Staff member ${person.name} added as ${person.role}`); return {ok:true}; },
  async toggleStaff(id, active){ await delay(120); const db = loadDB(); const s = db.staff.find(s=>s.id===id); if(s) s.active = active; saveDB(db); return {ok:true}; },
  async toggleBranch(id, active){ await delay(120); const db = loadDB(); const b = db.branches.find(b=>b.id===id); if(b) b.active = active; saveDB(db); return {ok:true}; },
  async addBranch(branch){ await delay(160); const db = loadDB(); db.branches.unshift(branch); saveDB(db); return {ok:true}; },
  async toggleTable(id){ await delay(100); const db = loadDB(); const tb = db.tables.find(t=>t.id===id); if(tb) tb.status = tb.status==='free' ? 'occupied' : 'free'; saveDB(db); return {ok:true}; },
  async toggleReview(id, approved){ await delay(120); const db = loadDB(); const r = db.reviews.find(r=>r.id===id); if(r) r.approved = approved; saveDB(db); return {ok:true}; },
  async markOrderPaid(id){ await delay(150); const db = loadDB(); const o = db.orders.find(o=>o.id===id); if(o) o.paymentStatus='Paid'; saveDB(db); logActivity(`Order ${id} marked as Paid`); return {ok:true}; },
  async refundOrder(id){ await delay(200); const db = loadDB(); const o = db.orders.find(o=>o.id===id); if(o) o.paymentStatus='Refunded'; saveDB(db); logActivity(`Order ${id} refunded (${o?fmt(o.total):''})`); return {ok:true}; },
  async addExpense(exp){ await delay(160); const db = loadDB(); db.expenses.unshift(exp); saveDB(db); logActivity(`Expense logged: ${exp.desc} (${fmt(exp.amount)})`); return {ok:true}; },
  async deleteExpense(id){ await delay(120); const db = loadDB(); db.expenses = db.expenses.filter(e=>e.id!==id); saveDB(db); return {ok:true}; },
  async updateGateway(cfg){ await delay(300); const db = loadDB(); db.paymentGateway = {...db.paymentGateway, ...cfg}; saveDB(db); logActivity('Payment gateway settings updated'); return {ok:true}; },

function miniToast(msg){
  const el = document.getElementById('miniToast'); document.getElementById('miniToastText').textContent = msg;
  el.style.opacity = '1'; el.style.transform = 'translate(-50%,0)';
  clearTimeout(window._mt); window._mt = setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translate(-50%,20px)'; }, 2200);
}
function playBeep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.type='sine'; o.frequency.value=880;
    g.gain.setValueAtTime(0.06, ctx.currentTime); o.start(); o.stop(ctx.currentTime+0.15);
  }catch(e){}
}

function isOpenNow(){
  const [oh,om] = config.workingHours.open.split(':').map(Number);
  const [ch,cm] = config.workingHours.close.split(':').map(Number);
  const now = new Date(); const mins = now.getHours()*60+now.getMinutes();
  const openMins = oh*60+om, closeMins = ch*60+cm;
  return closeMins > openMins ? (mins >= openMins && mins <= closeMins) : true;
}

function setScreen(name){
  document.getElementById('screen-client').classList.toggle('hidden', name !== 'client');
  document.getElementById('screen-admin').classList.toggle('hidden', name !== 'admin');
  document.querySelectorAll('.nav-btn').forEach(btn => {
    const active = btn.dataset.screen === name;
    btn.style.background = active ? 'var(--accent)' : 'transparent';
    btn.style.color = active ? '#14120F' : 'var(--text-dim)';
  });
  localStorage.setItem('menuos_demo_screen', name);
  if(name === 'client') renderClientMenu();
  if(name === 'admin') renderAdminShell();
}
document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', () => setScreen(btn.dataset.screen)));

async function renderClientMenu(){
  applyBranding();
  document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('langBtn').textContent = currentLang === 'en' ? 'AR' : 'EN';

  const menu = await MockAPI.getMenu();
  state.categories = menu.categories; state.items = menu.items;

  document.getElementById('closedBanner').classList.toggle('hidden', isOpenNow());

  const branches = (await MockAPI.getAll()).branches;
  const branch = branches.find(b => b.id === state.activeBranch) || branches[0];
  document.getElementById('branchPickerBtn').innerHTML = `📍 ${branch.name} <span style="color:var(--text-faint)">▾</span>`;

  renderOrderTypeTabs();

  const tabsEl = document.getElementById('categoryTabs');
  const cats = [{id:'all', name:t('all'), name_ar:t('all'), icon:'✨'}, {id:'favorites', name:t('favorites'), name_ar:t('favorites'), icon:'❤️'}, ...state.categories];
  tabsEl.innerHTML = cats.map(c => `
    <button class="tab-pill btn-press whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium border"
      style="${state.activeCategory === c.id ? `background:var(--accent); color:#14120F; border-color:var(--accent);` : `background:var(--surface-2); color:var(--text-dim); border-color:var(--border);`}"
      onclick="setActiveCategory('${c.id}')">${c.icon} ${currentLang==='ar' ? (c.name_ar||c.name) : c.name}</button>
  `).join('');

  const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  let items = state.items;
  if(q) items = items.filter(i => (i.name+' '+i.desc).toLowerCase().includes(q));
  if(state.activeCategory === 'favorites') items = items.filter(i => state.favorites.includes(i.id));
  else if(state.activeCategory !== 'all') items = items.filter(i => i.category === state.activeCategory);

  const listEl = document.getElementById('menuList');
  if(items.length === 0){
    listEl.innerHTML = `<div class="text-center py-16"><p class="text-4xl mb-3">🔎</p><p class="text-sm" style="color:var(--text-dim)">No items found.</p></div>`;
  } else if(state.activeCategory === 'all' && !q){
    listEl.innerHTML = state.categories.map(cat => {
      const catItems = state.items.filter(i => i.category === cat.id);
      if(catItems.length === 0) return '';
      return `<div><h2 class="font-display font-semibold text-base mb-3">${cat.icon} ${currentLang==='ar'?(cat.name_ar||cat.name):cat.name}</h2><div class="space-y-3">${catItems.map(renderItemCard).join('')}</div></div>`;
    }).join('');
  } else {
    listEl.innerHTML = `<div class="space-y-3">${items.map(renderItemCard).join('')}</div>`;
  }

  renderCartBar();
  maybeShowInstallBanner();
  refreshTrackChip();
}

function renderItemCard(item){
  const outOfStock = !item.active || item.stock <= 0;
  const isFav = state.favorites.includes(item.id);
  const name = currentLang==='ar' && item.name_ar ? item.name_ar : item.name;
  const desc = currentLang==='ar' && item.desc_ar ? item.desc_ar : item.desc;
  const lowStock = item.active && item.stock > 0 && item.stock <= item.lowStock;
  return `
    <div class="item-card rounded-2xl border p-4 flex gap-3 ${outOfStock ? 'opacity-50' : 'cursor-pointer'}"
      style="background:var(--surface); border-color:var(--border);" ${outOfStock ? '' : `onclick="openItemModal('${item.id}')"`}>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1.5 mb-1 flex-wrap">
          <h3 class="font-semibold text-sm">${name}</h3>
          ${(item.badges||[]).map(b => `<span class="badge" style="background:color-mix(in srgb, ${BADGE_COLORS[b]||'var(--accent)'} 18%, transparent); color:${BADGE_COLORS[b]||'var(--accent)'};">${b}</span>`).join('')}
        </div>
        <p class="text-xs leading-snug mb-2 line-clamp-2" style="color:var(--text-dim)">${desc}</p>
        <div class="flex items-center gap-2 mb-1.5">
          <span class="font-mono font-semibold text-sm" style="color:var(--accent)">${fmt(item.price)}</span>
          <span class="text-[11px] flex items-center gap-0.5" style="color:var(--text-faint)">⭐ ${item.rating} <span class="opacity-70">(${item.reviewCount})</span></span>
        </div>
        ${lowStock ? `<span class="status-chip px-1.5 py-0.5 rounded" style="background:rgba(225,84,63,.12); color:var(--red)">Only ${item.stock} left</span>` : ''}
      </div>
      <div class="flex flex-col items-center justify-between shrink-0">
        <button onclick="event.stopPropagation(); toggleFavorite('${item.id}')" class="btn-press text-lg">${isFav ? '❤️' : '🤍'}</button>
        <div class="w-16 h-16 rounded-xl flex items-center justify-center text-2xl" style="background:var(--surface-2)">🍽️</div>
        ${outOfStock
          ? `<span class="status-chip mt-2 px-2 py-1 rounded-md text-center" style="background:rgba(225,84,63,.15); color:var(--red);">${t('outOfStock').toUpperCase()}</span>`
          : `<button onclick="event.stopPropagation(); openItemModal('${item.id}')" class="qty-btn w-8 h-8 rounded-full flex items-center justify-center text-lg font-bold mt-2" style="background:var(--accent); color:#14120F;">+</button>`
        }
      </div>
    </div>`;
}

function openSheet(backdropId, sheetId){
  const backdrop = document.getElementById(backdropId), sheet = document.getElementById(sheetId);
  backdrop.classList.remove('hidden');
  requestAnimationFrame(() => { backdrop.style.opacity='1'; sheet.classList.remove('sheet-enter'); sheet.classList.add('sheet-open'); });

function openItemModal(itemId){
  const item = state.items.find(i => i.id === itemId);
  if(!item || !item.active || item.stock <= 0) return;
  state.currentModalItem = item; modalSelections = {}; modalQty = 1; modalMeal = false;
  item.options?.forEach(opt => { modalSelections[opt.name] = opt.type==='radio' ? opt.choices[0].label : []; });
  renderItemModal();
  openSheet('itemModalBackdrop','itemModalSheet');
}
function closeItemModal(e){ if(e && e.target !== e.currentTarget) return; closeSheet('itemModalBackdrop','itemModalSheet'); }

function calcModalUnitPrice(){
  const item = state.currentModalItem; let price = item.price;
  item.options?.forEach(opt => {
    if(opt.type === 'radio'){ const c = opt.choices.find(c => c.label === modalSelections[opt.name]); if(c) price += c.delta; }
    else { (modalSelections[opt.name]||[]).forEach(label => { const c = opt.choices.find(c=>c.label===label); if(c) price += c.delta; }); }
  });
  return price;
}

function cartTotals(){
  const count = state.cart.reduce((s,c)=>s+c.qty,0);
  const subtotal = state.cart.reduce((s,c)=>s+(c.unitPrice*c.qty)+c.mealAddon,0);
  return { count, subtotal };
}
function renderCartBar(){

let appliedPromo = null;
function applyPromoCode(){
  const code = document.getElementById('promoInput').value.trim().toUpperCase();
  loadDB().promoCodes.find; // noop guard
  const db = loadDB();
  const promo = db.promoCodes.find(p => p.code === code && p.active);
  const msgEl = document.getElementById('promoMsg');
  if(!promo){ appliedPromo = null; msgEl.textContent = 'Invalid or expired code.'; msgEl.style.color = 'var(--red)'; renderCheckoutTotals(); return; }
  appliedPromo = promo; msgEl.textContent = `Applied: ${promo.code} 🎉`; msgEl.style.color = 'var(--green)';
  renderCheckoutTotals();
}

function computeBreakdown(){
  const { subtotal } = cartTotals();
  let discount = 0;
  if(appliedPromo) discount = appliedPromo.type === 'percent' ? subtotal * (appliedPromo.value/100) : appliedPromo.value;
  discount = Math.min(discount, subtotal);
  const deliveryFee = state.orderType === 'Delivery' ? config.deliveryFee : 0;
  const taxable = subtotal - discount;
  const tax = taxable * config.taxRate;
  const service = taxable * config.serviceChargeRate;
  const total = taxable + tax + service + deliveryFee;
  return { subtotal, discount, deliveryFee, tax, service, total };
}

function renderCheckoutTotals(){
  const el = document.getElementById('checkoutTotals'); if(!el) return;

function buildWhatsAppMessage(order){
  const lines = [];
  lines.push(`*New Order — ${config.restaurantName}*`);
  lines.push(`Order #${order.id} · ${order.orderType}${order.tableNumber ? ' (Table '+order.tableNumber+')' : ''}`);
  lines.push('');
  lines.push(`*Customer:* ${order.customer.name}`);
  lines.push(`*Phone:* ${order.customer.phone}`);
  if(order.customer.address) lines.push(`*Address:* ${order.customer.address}`);
  lines.push(`*Payment:* ${order.payment}`);
  lines.push(`*When:* ${order.scheduledFor === 'asap' ? 'ASAP' : order.scheduledFor}`);
  lines.push('');
  lines.push('*Items:*');
  order.items.forEach(it => lines.push(`• ${it.qty}× ${it.name}${it.optionsSummary ? ` (${it.optionsSummary})` : ''}${it.isMeal ? ' + Meal upgrade' : ''} — ${fmt(it.lineTotal)}`));

  if(order.notes){ lines.push(''); lines.push(`*Notes:* ${order.notes}`); }
  lines.push('');
  lines.push(`*Total: ${fmt(order.total)}*`);
  return lines.join('\n');
}

/* ---------------- Overview ---------------- */
async function renderOverviewTab(container){
  const [menu, orders] = await Promise.all([MockAPI.getMenu(), MockAPI.getOrders()]);
  const today = new Date(); today.setHours(0,0,0,0);
  const todays = orders.filter(o => o.ts >= today.getTime() && o.status !== 'Cancelled');
  const salesToday = todays.reduce((s,o)=>s+o.total,0);
  const aov = todays.length ? salesToday/todays.length : 0;
  const lowStockItems = menu.items.filter(i => i.active && i.stock <= i.lowStock);

  const days = Array.from({length:7}, (_,i) => { const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-(6-i)); return d; });
  const daySales = days.map(d => orders.filter(o => o.status!=='Cancelled' && new Date(o.ts).toDateString()===d.toDateString()).reduce((s,o)=>s+o.total,0));
  const maxSale = Math.max(...daySales, 1);
  const barsHtml = daySales.map((v,i) => `
    <div class="flex flex-col items-center gap-1.5 flex-1">
      <div class="w-full rounded-t-md" style="height:${Math.max(6,(v/maxSale)*100)}px; background:var(--accent);"></div>
      <span class="text-[10px] font-mono" style="color:var(--text-faint)">${days[i].toLocaleDateString([], {weekday:'short'})}</span>
    </div>`).join('');

  const itemCounts = {};
  orders.forEach(o => o.items?.forEach(it => { itemCounts[it.name] = (itemCounts[it.name]||0) + it.qty; }));
  const topItems = Object.entries(itemCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const typeCounts = {};
  orders.forEach(o => { typeCounts[o.orderType||'Delivery'] = (typeCounts[o.orderType||'Delivery']||0)+1; });
  const typeTotal = orders.length || 1;

  container.innerHTML = `
    ${lowStockItems.length ? `<div class="rounded-2xl p-4 mb-5 border flex items-center gap-3" style="background:rgba(225,84,63,.08); border-color:var(--red);">
      <span class="text-xl">⚠️</span><p class="text-sm"><strong>${lowStockItems.length} item(s)</strong> running low on stock: ${lowStockItems.map(i=>i.name).join(', ')}</p>
    </div>` : ''}

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-6">
      ${statCard("Today's Sales", fmt(salesToday))}
      ${statCard('Total Orders', orders.length)}
      ${statCard('Avg Order Value', fmt(aov))}
      ${statCard('Active Items', `${menu.items.filter(i=>i.active).length}/${menu.items.length}`)}
    </div>

    <div class="grid lg:grid-cols-3 gap-5 mb-6">
      <div class="lg:col-span-2 rounded-2xl p-5 border" style="background:var(--surface); border-color:var(--border);">
        <p class="text-sm font-semibold mb-4">Revenue — Last 7 Days</p>
        <div class="flex items-end gap-2 h-32">${barsHtml}</div>
      </div>
      <div class="rounded-2xl p-5 border" style="background:var(--surface); border-color:var(--border);">
        <p class="text-sm font-semibold mb-4">Order Types</p>
        <div class="space-y-3">
          ${Object.entries(typeCounts).map(([k,v]) => `
            <div>
              <div class="flex justify-between text-xs mb-1"><span style="color:var(--text-dim)">${k}</span><span class="font-mono">${Math.round(v/typeTotal*100)}%</span></div>
              <div class="w-full h-2 rounded-full" style="background:var(--surface-3)"><div class="h-2 rounded-full" style="width:${v/typeTotal*100}%; background:var(--accent);"></div></div>
            </div>`).join('') || `<p class="text-xs" style="color:var(--text-faint)">No orders yet.</p>`}
        </div>
      </div>
    </div>

    <div class="rounded-2xl p-5 border" style="background:var(--surface); border-color:var(--border);">
      <p class="text-sm font-semibold mb-4">Top Selling Items</p>
      ${topItems.length ? `<div class="space-y-2">${topItems.map(([name,qty],i) => `
        <div class="flex items-center justify-between text-sm py-1.5">
          <span class="flex items-center gap-2"><span class="font-mono text-xs w-5" style="color:var(--text-faint)">#${i+1}</span>${name}</span>
          <span class="font-mono" style="color:var(--accent)">${qty} sold</span>
        </div>`).join('')}</div>` : `<p class="text-xs" style="color:var(--text-faint)">No sales data yet — place a demo order from the Client Menu.</p>`}
    </div>
  `;
}

let kdsMode = false, orderStatusFilter = 'All', orderSearchQ = '';
async function renderOrdersTab(container){
  const orders = await MockAPI.getOrders();
  let filtered = orders;
  if(orderStatusFilter !== 'All') filtered = filtered.filter(o => o.status === orderStatusFilter);
  if(orderSearchQ) filtered = filtered.filter(o => (o.id+o.customer.name+o.customer.phone).toLowerCase().includes(orderSearchQ.toLowerCase()));
  if(state.role === 'Kitchen') filtered = filtered.filter(o => ['Pending','Preparing'].includes(o.status));

  container.innerHTML = `

      <input id="orderSearchInput" value="${orderSearchQ}" oninput="orderSearchQ=this.value; renderAdminTab()" placeholder="Search order, name or phone…" class="flex-1 min-w-[180px] rounded-xl px-3.5 py-2.5 text-sm border" style="background:var(--surface-2); border-color:var(--border); color:var(--text);">

      <button onclick="exportOrdersCSV()" class="btn-press px-3.5 py-2.5 rounded-xl text-xs font-semibold border" style="background:var(--surface-2); color:var(--text-dim); border-color:var(--border);">⬇ Export CSV</button>` : ''}

          </tr>`;
        }).join('')}
      </tbody>
    </table></div>

async function setOrderStatus(id, status){ await MockAPI.updateOrderStatus(id, status); miniToast(`Order ${id} → ${status}`); renderAdminTab(); }
async function markOrderPaid(id){ await MockAPI.markOrderPaid(id); miniToast('Marked as Paid'); renderAdminTab(); }
async function cancelOrder(id){ const reason = prompt('Reason for cancellation (optional):') || ''; await MockAPI.updateOrderStatus(id, 'Cancelled', reason); renderAdminTab(); }
function printReceipt(id){
  loadDBAsync(id);
}
async function loadDBAsync(id){
  const orders = await MockAPI.getOrders(); const o = orders.find(x=>x.id===id); if(!o) return;
  const w = window.open('', '_blank', 'width=380,height=600');
  w.document.write(`
    <html><head><title>Receipt ${o.id}</title><style>
      body{font-family:monospace; padding:20px; color:#111;} h2{margin:0 0 4px;} .line{display:flex; justify-content:space-between; margin:2px 0;}
      hr{border:none; border-top:1px dashed #999; margin:10px 0;}
    </style></head><body>
      <h2>${config.restaurantName}</h2>
      <p>Order #${o.id}<br>${new Date(o.ts).toLocaleString()}</p>
      <hr>
      <p>${o.customer.name}<br>${o.customer.phone}${o.customer.address ? '<br>'+o.customer.address : ''}</p>
      <hr>
      ${o.items.map(it => `<div class="line"><span>${it.qty}× ${it.name}</span><span>${fmt(it.lineTotal)}</span></div>`).join('')}
      <hr>
      <div class="line"><span>Subtotal</span><span>${fmt(o.subtotal||0)}</span></div>
      <div class="line"><span>Tax</span><span>${fmt(o.tax||0)}</span></div>
      <div class="line"><span>Service</span><span>${fmt(o.service||0)}</span></div>
      <div class="line" style="font-weight:bold; font-size:16px;"><span>Total</span><span>${fmt(o.total)}</span></div>
      <hr><p style="text-align:center">Thank you! 🙏</p>
      <script>window.print()<\/script>
    </body></html>`);
  w.document.close();
}
function exportOrdersCSV(){
  MockAPI.getOrders().then(orders => {
    const rows = [['Order ID','Date','Customer','Phone','Type','Status','Total']];
    orders.forEach(o => rows.push([o.id, new Date(o.ts).toLocaleString(), o.customer.name, o.customer.phone, o.orderType, o.status, o.total]));
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'orders.csv'; a.click();
    miniToast('Orders exported to CSV');
  });
}

function posCartTotals(){
  const subtotal = posCart.reduce((s,c)=>s+c.price*c.qty,0);
  const discount = Math.min(posDiscountValue, subtotal);
  const taxable = subtotal - discount;
  const tax = taxable*config.taxRate, service = taxable*config.serviceChargeRate;
  return { subtotal, discount, tax, service, total: taxable+tax+service };
}
function renderPOSTotals(){
  const el = document.getElementById('posTotals'); if(!el) return;
  const b = posCartTotals();
  el.innerHTML = `
    <div class="flex justify-between text-sm"><span style="color:var(--text-dim)">Subtotal</span><span class="font-mono">${fmt(b.subtotal)}</span></div>
    ${b.discount>0?`<div class="flex justify-between text-sm"><span style="color:var(--green)">Discount</span><span class="font-mono" style="color:var(--green)">-${fmt(b.discount)}</span></div>`:''}
    <div class="flex justify-between text-sm"><span style="color:var(--text-dim)">Tax</span><span class="font-mono">${fmt(b.tax)}</span></div>
    <div class="flex justify-between text-sm"><span style="color:var(--text-dim)">Service</span><span class="font-mono">${fmt(b.service)}</span></div>
    <div class="flex justify-between items-center pt-2 mt-1 border-t" style="border-color:var(--border);"><span class="text-sm font-medium">Total</span><span class="font-mono font-bold text-lg" style="color:var(--accent)">${fmt(b.total)}</span></div>`;
  const tenderedEl = document.getElementById('posTendered'), changeEl = document.getElementById('posChangeDue');
  if(tenderedEl && changeEl){
    const tendered = Number(tenderedEl.value)||0, change = tendered - b.total;
    changeEl.textContent = tendered>0 ? (change>=0 ? `Change due: ${fmt(change)}` : `Short by ${fmt(-change)}`) : '';
    changeEl.style.color = change>=0 ? 'var(--green)' : 'var(--red)';
  }
}
function posAddItem(itemId){
  const item = state.items.find(i=>i.id===itemId); if(!item) return;
  const existing = posCart.find(c=>c.itemId===itemId);
  if(existing) existing.qty++; else posCart.push({cartId:uid('pos'), itemId:item.id, name:item.name, price:item.price, qty:1});
  renderAdminTab();
}
function posChangeQty(cartId, d){ const line = posCart.find(c=>c.cartId===cartId); if(!line) return; line.qty = Math.max(1,line.qty+d); renderAdminTab(); }
function posRemove(cartId){ posCart = posCart.filter(c=>c.cartId!==cartId); renderAdminTab(); }
function posSetPayment(p){ posPayment = p; renderAdminTab(); }
async function posCompleteSale(){
  if(posCart.length===0){ miniToast('Add items to the order first'); return; }

    notes:'', subtotal:b.subtotal, discount:b.discount, deliveryFee:0, tax:b.tax, service:b.service, total:b.total,
    status:'Delivered', paymentStatus:'Paid', source:'POS Terminal'

let reportRange = '7';
async function renderReportsTab(container){
  const [orders, db] = await Promise.all([MockAPI.getOrders(), MockAPI.getAll()]);
  const now = Date.now();
  const cutoff = reportRange==='today' ? new Date().setHours(0,0,0,0) : now - Number(reportRange)*86400000;
  const inRange = orders.filter(o=>o.ts>=cutoff);
  const validOrders = inRange.filter(o=>o.paymentStatus!=='Refunded' && o.status!=='Cancelled');
  const grossRevenue = validOrders.reduce((s,o)=>s+o.total,0);
  const refunds = inRange.filter(o=>o.paymentStatus==='Refunded').reduce((s,o)=>s+o.total,0);
  const taxCollected = validOrders.reduce((s,o)=>s+(o.tax||0),0);
  const serviceCollected = validOrders.reduce((s,o)=>s+(o.service||0),0);
  const expensesInRange = db.expenses.filter(e=>e.ts>=cutoff).reduce((s,e)=>s+e.amount,0);
  const estCost = validOrders.reduce((s,o)=>s + o.items.reduce((s2,it)=>s2+it.lineTotal*0.45,0), 0);
  const netProfit = grossRevenue - estCost - expensesInRange;

  const catRevenue = {};
  validOrders.forEach(o => o.items.forEach(it => {
    const menuItem = db.items.find(i=>i.name===it.name);
    const cat = menuItem ? (db.categories.find(c=>c.id===menuItem.category)?.name || 'Other') : 'Other';
    catRevenue[cat] = (catRevenue[cat]||0) + it.lineTotal;
  }));
  const methodRevenue = {};
  validOrders.forEach(o => { methodRevenue[o.payment||'Cash'] = (methodRevenue[o.payment||'Cash']||0)+o.total; });

  container.innerHTML = `
    <div class="flex items-center gap-2 mb-5 flex-wrap">
      <select onchange="reportRange=this.value; renderAdminTab()" class="rounded-xl px-3 py-2.5 text-sm border" style="background:var(--surface-2); border-color:var(--border); color:var(--text);">

        <option value="7" ${reportRange==='7'?'selected':''}>Last 7 Days</option>

        <option value="365" ${reportRange==='365'?'selected':''}>This Year</option>
      </select>
      <button onclick="exportReportCSV()" class="btn-press px-3.5 py-2.5 rounded-xl text-xs font-semibold border" style="background:var(--surface-2); color:var(--text-dim); border-color:var(--border);">⬇ Export Report</button>
    </div>
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-6">
      ${statCard('Gross Revenue', fmt(grossRevenue))}
      ${statCard('Tax Collected', fmt(taxCollected))}
      ${statCard('Service Charge', fmt(serviceCollected))}
      ${statCard('Refunds', fmt(refunds))}
      ${statCard('Est. Cost of Goods', fmt(estCost))}
      ${statCard('Expenses', fmt(expensesInRange))}
      ${statCard('Orders', validOrders.length)}
      ${statCard('Net Profit', fmt(netProfit))}
    </div>
    <div class="grid lg:grid-cols-2 gap-5">
      <div class="rounded-2xl p-5 border" style="background:var(--surface); border-color:var(--border);">
        <p class="text-sm font-semibold mb-4">Revenue by Category</p>
        ${Object.keys(catRevenue).length ? Object.entries(catRevenue).sort((a,b)=>b[1]-a[1]).map(([k,v]) => `
          <div class="mb-3"><div class="flex justify-between text-xs mb-1"><span style="color:var(--text-dim)">${k}</span><span class="font-mono">${fmt(v)}</span></div>
          <div class="w-full h-2 rounded-full" style="background:var(--surface-3)"><div class="h-2 rounded-full" style="width:${(v/grossRevenue*100)||0}%; background:var(--accent);"></div></div></div>`).join('') : `<p class="text-xs" style="color:var(--text-faint)">No data in this range.</p>`}
      </div>
      <div class="rounded-2xl p-5 border" style="background:var(--surface); border-color:var(--border);">
        <p class="text-sm font-semibold mb-4">Revenue by Payment Method</p>
        ${Object.keys(methodRevenue).length ? Object.entries(methodRevenue).map(([k,v]) => `
          <div class="mb-3"><div class="flex justify-between text-xs mb-1"><span style="color:var(--text-dim)">${k}</span><span class="font-mono">${fmt(v)}</span></div>
          <div class="w-full h-2 rounded-full" style="background:var(--surface-3)"><div class="h-2 rounded-full" style="width:${(v/grossRevenue*100)||0}%; background:var(--teal);"></div></div></div>`).join('') : `<p class="text-xs" style="color:var(--text-faint)">No data in this range.</p>`}
      </div>
    </div>
    <p class="text-[11px] mt-4" style="color:var(--text-faint)">Cost of goods is estimated at 45% of item price for demo purposes — connect real supplier costs per item in production.</p>`;
}
function exportReportCSV(){
  MockAPI.getOrders().then(orders => {
    const rows = [['Order ID','Date','Type','Payment Method','Payment Status','Total','Tax','Service']];
    orders.forEach(o => rows.push([o.id, new Date(o.ts).toLocaleString(), o.orderType, o.payment||'Cash', o.paymentStatus||'Paid', o.total, o.tax||0, o.service||0]));
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'financial-report.csv'; a.click();
    miniToast('Report exported');
  });
}

    <div class="rounded-2xl p-4 border mb-5 flex flex-wrap gap-2 items-end" style="background:var(--surface); border-color:var(--border);">
      <div><label class="text-xs" style="color:var(--text-faint)">Code</label><input id="newPromoCode" placeholder="SUMMER20" class="block rounded-lg px-3 py-2 text-sm border font-mono uppercase mt-1" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"></div>
      <div><label class="text-xs" style="color:var(--text-faint)">Type</label><select id="newPromoType" class="block rounded-lg px-3 py-2 text-sm border mt-1" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"><option value="percent">%</option><option value="fixed">Fixed</option></select></div>
      <div><label class="text-xs" style="color:var(--text-faint)">Value</label><input id="newPromoValue" type="number" placeholder="20" class="block rounded-lg px-3 py-2 text-sm border font-mono w-24 mt-1" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"></div>
      <button onclick="addPromo()" class="btn-press px-4 py-2.5 rounded-lg text-sm font-semibold" style="background:var(--accent); color:#14120F;">+ Add Code</button>
    </div>
    <div class="rounded-2xl border overflow-hidden" style="background:var(--surface); border-color:var(--border);">
      <table class="w-full text-sm"><thead><tr class="text-left text-[11px] font-mono uppercase tracking-wide" style="color:var(--text-faint); background:var(--surface-2);">
        <th class="px-4 py-3">Code</th><th class="px-4 py-3">Discount</th><th class="px-4 py-3">Status</th><th class="px-4 py-3 text-right">Actions</th></tr></thead>
        <tbody>${db.promoCodes.map(p => `
          <tr class="border-t" style="border-color:var(--border);">
            <td class="px-4 py-3 font-mono font-semibold">${p.code}</td>
            <td class="px-4 py-3 text-sm">${p.type==='percent' ? p.value+'%' : fmt(p.value)}</td>
            <td class="px-4 py-3"><input type="checkbox" class="tgl" ${p.active?'checked':''} onchange="togglePromo('${p.id}', this.checked)"></td>
            <td class="px-4 py-3 text-right"><button onclick="deletePromo('${p.id}')" class="text-xs" style="color:var(--red)">Delete</button></td>
          </tr>`).join('')}</tbody>
      </table>
    </div>`;
}
async function addPromo(){
  const code = document.getElementById('newPromoCode').value.trim().toUpperCase();
  const type = document.getElementById('newPromoType').value;
  const value = Number(document.getElementById('newPromoValue').value) || 0;
  if(!code || !value) return;
  await MockAPI.addPromo({ id: uid('promo'), code, type, value, active:true });
  miniToast('Promo code created'); renderAdminTab();
}
async function togglePromo(id, active){ await MockAPI.togglePromo(id, active); renderAdminTab(); }
async function deletePromo(id){ await MockAPI.deletePromo(id); renderAdminTab(); }

/* ---------------- Customers CRM ---------------- */
async function renderCustomersTab(container){
  const orders = await MockAPI.getOrders();
  const map = {};
  orders.forEach(o => {
    const key = o.customer.phone;
    if(!map[key]) map[key] = { name:o.customer.name, phone:o.customer.phone, orders:0, spent:0 };
    map[key].orders++; map[key].spent += o.total;
  });
  const customers = Object.values(map).sort((a,b)=>b.spent-a.spent);
  const tier = (spent) => spent >= 2000 ? {l:'Gold', c:'var(--accent)'} : spent >= 800 ? {l:'Silver', c:'var(--text-dim)'} : {l:'Bronze', c:'#B08D57'};

  container.innerHTML = customers.length === 0 ? `<div class="rounded-2xl border p-12 text-center" style="background:var(--surface); border-color:var(--border);"><p class="text-sm" style="color:var(--text-dim)">No customers yet — place a demo order to populate this list.</p></div>` : `
    <div class="rounded-2xl border overflow-hidden" style="background:var(--surface); border-color:var(--border);">
      <table class="w-full text-sm"><thead><tr class="text-left text-[11px] font-mono uppercase tracking-wide" style="color:var(--text-faint); background:var(--surface-2);">
        <th class="px-4 py-3">Customer</th><th class="px-4 py-3">Phone</th><th class="px-4 py-3">Orders</th><th class="px-4 py-3">Total Spent</th><th class="px-4 py-3">Points</th><th class="px-4 py-3">Tier</th></tr></thead>
        <tbody>${customers.map(c => { const tr = tier(c.spent); return `
          <tr class="border-t" style="border-color:var(--border);">
            <td class="px-4 py-3 font-medium">${c.name}</td>
            <td class="px-4 py-3 font-mono text-xs" style="color:var(--text-dim)">${c.phone}</td>
            <td class="px-4 py-3">${c.orders}</td>
            <td class="px-4 py-3 font-mono" style="color:var(--accent)">${fmt(c.spent)}</td>
            <td class="px-4 py-3 font-mono text-xs">${Math.round(c.spent*0.05)}</td>
            <td class="px-4 py-3"><span class="status-chip px-2 py-1 rounded-md" style="background:color-mix(in srgb, ${tr.c} 18%, transparent); color:${tr.c};">${tr.l}</span></td>
          </tr>`; }).join('')}</tbody>
      </table>
    </div>`;
}

/* ---------------- Staff ---------------- */

      <div><label class="text-xs" style="color:var(--text-faint)">Role</label><select id="newStaffRole" class="block rounded-lg px-3 py-2 text-sm border mt-1" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"><option>Admin</option><option>Cashier</option><option>Kitchen</option></select></div>
      <button onclick="addStaff()" class="btn-press px-4 py-2.5 rounded-lg text-sm font-semibold" style="background:var(--accent); color:#14120F;">+ Add Staff</button>

async function addStaff(){
  const name = document.getElementById('newStaffName').value.trim(); const role = document.getElementById('newStaffRole').value;
  if(!name) return; await MockAPI.addStaff({ id: uid('staff'), name, role, active:true }); miniToast('Staff member added'); renderAdminTab();

async function toggleStaff(id, active){ await MockAPI.toggleStaff(id, active); renderAdminTab(); }

  container.innerHTML = `
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">

/* ---------------- Activity Log ---------------- */

/* ---------------- Settings ---------------- */
async function renderSettingsTab(container){
  const swatches = ['#E8A33D','#2FB8A3','#E1543F','#60A5FA','#B794F4','#4ADE80'];
  container.innerHTML = `
    <div class="grid lg:grid-cols-2 gap-5">
      <div class="rounded-2xl p-5 border space-y-4" style="background:var(--surface); border-color:var(--border);">
        <p class="text-sm font-semibold">Branding</p>
        <div><label class="text-xs" style="color:var(--text-faint)">Restaurant Name</label><input id="setName" value="${config.restaurantName}" class="w-full mt-1 rounded-lg px-3 py-2 text-sm border" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"></div>
        <div><label class="text-xs" style="color:var(--text-faint)">Tagline</label><input id="setTagline" value="${config.tagline}" class="w-full mt-1 rounded-lg px-3 py-2 text-sm border" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"></div>
        <div><label class="text-xs" style="color:var(--text-faint)">Logo Initials</label><input id="setLogo" value="${config.logoInitials}" maxlength="3" class="w-24 mt-1 rounded-lg px-3 py-2 text-sm border font-mono" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"></div>
        <div>
          <label class="text-xs block mb-2" style="color:var(--text-faint)">Accent Color</label>
          <div class="flex gap-2 flex-wrap">${swatches.map(c => `<button onclick="pickAccent('${c}')" class="w-9 h-9 rounded-full border-2 btn-press" style="background:${c}; border-color:${config.colors.primary===c?'var(--text)':'transparent'};"></button>`).join('')}
            <input id="setAccentCustom" type="color" value="${config.colors.primary}" onchange="pickAccent(this.value)" class="w-9 h-9 rounded-full border-0 bg-transparent cursor-pointer">
          </div>
        </div>
        <div><label class="text-xs" style="color:var(--text-faint)">WhatsApp Number (intl, no +)</label><input id="setWA" value="${config.whatsappNumber}" class="w-full mt-1 rounded-lg px-3 py-2 text-sm border font-mono" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"></div>
      </div>

      <div class="rounded-2xl p-5 border space-y-4" style="background:var(--surface); border-color:var(--border);">
        <p class="text-sm font-semibold">Business Rules</p>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="text-xs" style="color:var(--text-faint)">Currency</label><input id="setCurrency" value="${config.currency}" class="w-full mt-1 rounded-lg px-3 py-2 text-sm border font-mono" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"></div>
          <div><label class="text-xs" style="color:var(--text-faint)">Tax Rate %</label><input id="setTax" type="number" value="${Math.round(config.taxRate*100)}" class="w-full mt-1 rounded-lg px-3 py-2 text-sm border font-mono" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"></div>
          <div><label class="text-xs" style="color:var(--text-faint)">Service Charge %</label><input id="setService" type="number" value="${Math.round(config.serviceChargeRate*100)}" class="w-full mt-1 rounded-lg px-3 py-2 text-sm border font-mono" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"></div>
          <div><label class="text-xs" style="color:var(--text-faint)">Delivery Fee</label><input id="setDeliveryFee" type="number" value="${config.deliveryFee}" class="w-full mt-1 rounded-lg px-3 py-2 text-sm border font-mono" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"></div>
          <div><label class="text-xs" style="color:var(--text-faint)">Minimum Order</label><input id="setMinOrder" type="number" value="${config.minOrder}" class="w-full mt-1 rounded-lg px-3 py-2 text-sm border font-mono" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"></div>
          <div><label class="text-xs" style="color:var(--text-faint)">Default Language</label><select id="setLang" class="w-full mt-1 rounded-lg px-3 py-2 text-sm border" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"><option value="en" ${config.defaultLang==='en'?'selected':''}>English</option><option value="ar" ${config.defaultLang==='ar'?'selected':''}>العربية</option></select></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="text-xs" style="color:var(--text-faint)">Opening Time</label><input id="setOpen" type="time" value="${config.workingHours.open}" class="w-full mt-1 rounded-lg px-3 py-2 text-sm border font-mono" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"></div>
          <div><label class="text-xs" style="color:var(--text-faint)">Closing Time</label><input id="setClose" type="time" value="${config.workingHours.close}" class="w-full mt-1 rounded-lg px-3 py-2 text-sm border font-mono" style="background:var(--surface-2); border-color:var(--border); color:var(--text);"></div>
        </div>
      </div>
    </div>
    <button onclick="saveSettingsForm()" class="btn-press mt-5 px-5 py-3 rounded-xl text-sm font-semibold" style="background:var(--accent); color:#14120F;">Save Settings</button>
    <span id="settingsSavedMsg" class="ml-3 text-xs" style="color:var(--green)"></span>
  `;
}
function pickAccent(hex){ config.colors.primary = hex; document.documentElement.style.setProperty('--accent', hex); renderSettingsTab(document.getElementById('adminContent')); }
function saveSettingsForm(){
  config.restaurantName = document.getElementById('setName').value.trim() || config.restaurantName;
  config.tagline = document.getElementById('setTagline').value.trim();
  config.logoInitials = document.getElementById('setLogo').value.trim().toUpperCase() || config.logoInitials;
  config.whatsappNumber = document.getElementById('setWA').value.trim();
  config.currency = document.getElementById('setCurrency').value.trim() || config.currency;
  config.taxRate = (Number(document.getElementById('setTax').value)||0)/100;
  config.serviceChargeRate = (Number(document.getElementById('setService').value)||0)/100;
  config.deliveryFee = Number(document.getElementById('setDeliveryFee').value)||0;
  config.minOrder = Number(document.getElementById('setMinOrder').value)||0;
  config.defaultLang = document.getElementById('setLang').value;
  config.workingHours = { open: document.getElementById('setOpen').value, close: document.getElementById('setClose').value };
  saveSettings(); applyBranding();
  document.getElementById('settingsSavedMsg').textContent = 'Saved ✓';
  setTimeout(()=>{ const el = document.getElementById('settingsSavedMsg'); if(el) el.textContent=''; }, 2000);
  miniToast('Settings saved — syncing to Client Menu');
}

/* ============================================================
   LIVE ORDER POLLING (new-order sound + admin badge)
============================================================= */
let lastSeenOrderCount = null;
setInterval(async () => {
  if(document.getElementById('screen-admin').classList.contains('hidden')) return;
  const orders = await MockAPI.getOrders();
  if(lastSeenOrderCount === null){ lastSeenOrderCount = orders.length; return; }
  if(orders.length > lastSeenOrderCount){ playBeep(); miniToast('🔔 New order received!'); if(state.adminTab==='overview'||state.adminTab==='orders') renderAdminTab(); }
  lastSeenOrderCount = orders.length;
}, 4000);

/* ============================================================
   INIT
============================================================= */
document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
document.getElementById('langBtn').textContent = currentLang === 'en' ? 'AR' : 'EN';
applyTheme();
applyBranding();
const savedScreen = localStorage.getItem('menuos_demo_screen') || 'client';
setScreen(savedScreen);
</script>
